<script type="text/javascript">
    RED.nodes.registerType('mv-aruco-reference', {
        category: 'Machine Vision',
        color: '#70AD47',
        defaults: {
            name: {value: ""},
            apiConfig: {value: "", type: "mv-config", required: true},
            dictionary: {value: "DICT_4X4_50"},
            mode: {value: "single"},
            // Single marker config
            singleMarkerId: {value: 0, validate: RED.validators.number()},
            singleMarkerSize: {value: 50.0, validate: RED.validators.number()},
            singleOrigin: {value: "marker_center"},
            singleRotationRef: {value: "marker_rotation"},
            // Plane config
            planeMarkerIds: {value: {top_left: 0, top_right: 1, bottom_right: 2, bottom_left: 3}},
            planeWidth: {value: 200.0, validate: RED.validators.number()},
            planeHeight: {value: 150.0, validate: RED.validators.number()},
            planeOrigin: {value: "top_left"},
            planeXDirection: {value: "right"},
            planeYDirection: {value: "down"}
        },
        inputs: 1,
        outputs: 1,
        icon: "font-awesome/fa-arrows",
        label: function() {
            return this.name || "ArUco Reference";
        },
        paletteLabel: "ArUco reference",
        oneditprepare: function() {
            const node = this;

            // Show/hide config based on mode
            function updateModeVisibility() {
                const mode = $("#node-input-mode").val();
                if (mode === 'single') {
                    $(".form-row-single").show();
                    $(".form-row-plane").hide();
                } else {
                    $(".form-row-single").hide();
                    $(".form-row-plane").show();
                }
            }

            // Mode selector change handler
            $("#node-input-mode").on("change", updateModeVisibility);

            // Initialize plane marker IDs from object
            if (node.planeMarkerIds) {
                $("#node-input-plane-marker-tl").val(node.planeMarkerIds.top_left || 0);
                $("#node-input-plane-marker-tr").val(node.planeMarkerIds.top_right || 1);
                $("#node-input-plane-marker-br").val(node.planeMarkerIds.bottom_right || 2);
                $("#node-input-plane-marker-bl").val(node.planeMarkerIds.bottom_left || 3);
            }

            // Initial visibility
            updateModeVisibility();
        },
        oneditsave: function() {
            // Convert plane marker ID inputs to object
            this.planeMarkerIds = {
                top_left: parseInt($("#node-input-plane-marker-tl").val()),
                top_right: parseInt($("#node-input-plane-marker-tr").val()),
                bottom_right: parseInt($("#node-input-plane-marker-br").val()),
                bottom_left: parseInt($("#node-input-plane-marker-bl").val())
            };
        }
    });
</script>

<script type="text/html" data-help-name="mv-aruco-reference">
    <p>Creates a coordinate reference frame from ArUco markers for transforming pixel coordinates to real-world millimeter measurements.</p>

    <h3>Modes</h3>
    <dl class="message-properties">
        <dt>Single Marker</dt>
        <dd>Uses one ArUco marker with known size. Provides uniform scaling (suitable for perpendicular camera view).</dd>

        <dt>Plane (4 markers)</dt>
        <dd>Uses four ArUco markers at corners. Provides perspective transform (handles camera angle).</dd>
    </dl>

    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>image_id <span class="property-type">string</span></dt>
        <dd>Image ID from camera capture or msg.payload.image_id</dd>

        <dt>payload <span class="property-type">any</span></dt>
        <dd>Original payload is preserved in output (forward pattern)</dd>
    </dl>

    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>reference_object <span class="property-type">object</span></dt>
        <dd>
            Reference frame containing:
            <ul>
                <li><code>type</code>: "single_marker" or "plane"</li>
                <li><code>units</code>: "mm" (millimeters)</li>
                <li><code>homography_matrix</code>: 3x3 transformation matrix</li>
                <li><code>metadata</code>: Configuration and calibration data</li>
            </ul>
        </dd>

        <dt>payload <span class="property-type">any</span></dt>
        <dd>Original payload unchanged (preserved from input)</dd>

        <dt>markers <span class="property-type">array</span></dt>
        <dd>Detected ArUco markers used for calibration (for debugging)</dd>
    </dl>

    <h3>Details</h3>
    <p>This node creates a reference coordinate system that can be used by downstream vision nodes (template matching, rotation detection, color detection) to transform their results from pixel coordinates to real-world millimeter coordinates.</p>

    <p><strong>Single Marker Mode:</strong></p>
    <ul>
        <li>Specify marker ID and physical size in mm</li>
        <li>Choose origin point (center, top-left, or bottom-left)</li>
        <li>Choose rotation reference (marker rotation or image axes)</li>
        <li>Best for perpendicular camera view</li>
    </ul>

    <p><strong>Plane Mode:</strong></p>
    <ul>
        <li>Place 4 markers at corners of calibration plane</li>
        <li>Specify marker IDs for each corner</li>
        <li>Enter physical dimensions (width × height in mm)</li>
        <li>Configure coordinate system (origin, X/Y directions)</li>
        <li>Handles perspective distortion from camera angle</li>
    </ul>

    <h3>Example Flow</h3>
    <pre>
[Camera Capture] → [ArUco Reference] → [Template Match] → [Debug]
                          ↓                    ↓
                   creates reference    adds plane_position_mm
                                       adds plane_rotation_deg
    </pre>

    <p><strong>Usage with Vision Nodes:</strong></p>
    <p>Pass the <code>reference_object</code> to vision detection nodes (template match, rotation detect, color detect) to add transformed coordinates to their results:</p>
    <ul>
        <li><code>plane_position_mm</code>: {x, y} position in millimeters</li>
        <li><code>plane_rotation_deg</code>: Rotation angle relative to reference</li>
        <li><code>plane_dimensions_mm</code>: {width, height} in millimeters</li>
    </ul>
</script>
